name: Homebrew lifecycle

on:
  workflow_dispatch:
  push:
    paths:
      - "Formula/**"
      - ".github/workflows/homebrew.yml"

permissions:
  contents: read

jobs:
  formula:
    name: Homebrew (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate formula
        run: |
          brew style Formula/tokenkeeper.rb
          brew audit --new Formula/tokenkeeper.rb
      - name: Clean install from source
        run: brew install --build-from-source Formula/tokenkeeper.rb
      - name: Formula test
        run: brew test tokenkeeper
      - name: Upgrade lifecycle
        run: brew upgrade tokenkeeper
      - name: Uninstall and preserve user configuration
        run: |
          config="$HOME/.tokenkeeper-lifecycle-fixture"
          printf 'fixture\n' > "$config"
          brew uninstall tokenkeeper
          test -f "$config"
          rm -f "$config"
