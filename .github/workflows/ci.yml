name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install stable Rust
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Install quality components
        run: rustup component add rustfmt clippy --toolchain 1.85.0

      - name: Check formatting
        run: cargo +1.85.0 fmt --all --check

      - name: Run tests
        run: cargo +1.85.0 test --locked --all-targets --all-features

      - name: Check and build
        run: |
          cargo +1.85.0 check --locked --all-targets --all-features
          cargo +1.85.0 build --locked --all-targets --all-features

      - name: Run Clippy
        run: cargo +1.85.0 clippy --locked --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        run: cargo +1.85.0 install cargo-llvm-cov --version 0.6.16 --locked

      - name: Enforce line coverage
        run: cargo +1.85.0 llvm-cov --locked --all-targets --all-features --workspace --ignore-filename-regex 'src/identity\\.rs' --fail-under-lines 80
